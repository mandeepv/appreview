name: CI

on:
  # Run CI on every branch push so checks actually run where development
  # happens, not just on main (SPEC-05). pull_request stays scoped to PRs
  # targeting main. A PR from a branch in this same repo would otherwise run
  # twice (once for the push, once for the PR) — acceptable, and GitHub
  # dedupes concurrent runs of the same workflow on the same SHA.
  pull_request:
    branches: [main]
  push:
    branches: ['**']

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fails only on errors, not warnings. The current baseline has ~200
      # warnings (mostly unused-vars and Animated.Value ref pattern in
      # lesson screens) that the v1.2 lesson refactor will clear. Rules
      # deliberately downgraded in eslint.config.js so CI only catches
      # things that are actual bugs — new errors will fail the PR.
      - name: Lint
        run: npm run lint

  version-drift:
    name: Version drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Kinderwell marketing version needs to agree between app.json
      # (what EAS reads at build time) and package.json (what shows up as
      # release metadata). Fable review #7 caught real drift: app.json =
      # 1.1.0, package.json = 1.0.0. Anyone `git blame`-ing to understand
      # a bug would follow the wrong version string. This job fails the PR
      # if the two disagree so a bump-version.sh run is enforced.
      - name: Check app.json and package.json versions agree
        run: |
          APP_JSON_VER=$(node -e "console.log(require('./app.json').expo.version)")
          PACKAGE_VER=$(node -e "console.log(require('./package.json').version)")
          echo "app.json marketing version:  $APP_JSON_VER"
          echo "package.json version:        $PACKAGE_VER"
          if [ "$APP_JSON_VER" != "$PACKAGE_VER" ]; then
            echo ""
            echo "::error::Version drift detected — app.json ($APP_JSON_VER) and package.json ($PACKAGE_VER) disagree."
            echo "Run ./scripts/bump-version.sh <version> <build> to sync them."
            exit 1
          fi
          echo "✅ Versions match"

  test:
    name: Jest tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --ci makes Jest fail (rather than write) on a missing snapshot, and
      # disables watch. Our suite is pure policy-kernel tests (SPEC-04) — no
      # simulator, fast (<1s locally).
      - name: Run tests
        run: npm test -- --ci

  audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    # Advisory for now: a vulnerable transitive dep should surface on every PR,
    # but we don't want it to block merges while the current baseline still has
    # known advisories in dev-only / build-time deps. Once SPEC-07 removes the
    # dead dependencies and we've triaged what's left, flip this to a hard gate
    # by deleting `continue-on-error` below (and bump --audit-level as tolerance
    # allows).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high and above)
        run: npm audit --audit-level=high
